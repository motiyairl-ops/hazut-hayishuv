<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-dark:#0D47A1;--blue-mid:#1565C0;--blue-light:#42A5F5;
  --blue-pale:#EFF6FF;--blue-bg:#F0F7FF;--blue-border:#BBDEFB;
  --text:#1a2340;--text-muted:#5a6a85;--white:#fff;
  --green:#2e7d32;--red:#c62828;
  --radius:9px;--shadow:0 1px 5px rgba(21,101,192,0.10);
}
html{font-family:'Heebo',Arial,sans-serif;background:var(--blue-bg);color:var(--text);}
body{background:var(--blue-bg);overflow-x:hidden;}

/* ── DESKTOP ── */
html,body{height:100%;overflow:hidden;}
.shell{display:grid;grid-template-rows:auto auto auto 1fr;height:100vh;padding:8px 16px;gap:7px;max-width:960px;margin:0 auto;}

/* ── HEADER ── */
.hdr{text-align:center;padding:8px 0 4px;}
.hdr-inner{display:inline-flex;align-items:center;justify-content:center;gap:12px;}
.hdr-icon{width:56px;height:56px;flex-shrink:0;object-fit:contain;}
.hdr h1{font-size:28px;font-weight:700;color:var(--blue-dark);line-height:1.2;margin:0;}
.hdr .sub{font-size:11px;color:var(--text-muted);margin-top:4px;min-height:16px;display:flex;align-items:center;justify-content:center;gap:8px;}
.save-indicator{font-size:11px;color:var(--text-muted);}
.save-indicator.saving{color:var(--blue-mid);}
.save-indicator.saved{color:var(--green);}
.save-indicator.error{color:var(--red);}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--white);border-radius:var(--radius);padding:4px;border:1px solid var(--blue-border);box-shadow:var(--shadow);}
.tab-btn{flex:1;padding:7px 4px;border:none;border-radius:7px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text-muted);background:transparent;}
.tab-btn.active{background:var(--blue-mid);color:#fff;box-shadow:0 2px 7px rgba(21,101,192,.22)}
.tab-btn:not(.active):hover{background:var(--blue-pale);color:var(--blue-mid)}
.tab-sep{width:1px;background:var(--blue-border);align-self:stretch;margin:4px 0;flex-shrink:0;}
.tab-pane{display:none;}
.tab-pane.active{display:flex;flex-direction:column;gap:7px;height:100%;overflow:hidden;}

/* ── CARDS ── */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--blue-border);overflow:hidden;}
.card-title{font-size:18px;font-weight:700;color:#fff;padding:6px 12px;background:var(--blue-mid);display:flex;align-items:center;gap:6px;}
.card-body{padding:8px 12px}

/* ── TOP CARD ── */
.top-card{flex-shrink:0}
.top-inner{display:grid;grid-template-columns:auto auto auto 1fr;gap:10px;align-items:start;padding:8px 12px;}
.top-field{display:flex;flex-direction:column;gap:3px}
.top-field label{font-size:15px;font-weight:600;color:var(--text-muted);white-space:nowrap;}
.top-field input{padding:5px 9px;border:1.5px solid var(--blue-border);border-radius:7px;font-family:inherit;font-size:13px;color:var(--text);background:var(--blue-pale);direction:rtl;transition:border-color .14s;}
.top-field input:focus{outline:none;border-color:var(--blue-light);background:#fff}
.top-field input[type=date]{width:140px}
.top-field input[type=text]{width:110px}
.top-field textarea.guests-ta{padding:5px 9px;border:1.5px solid var(--blue-border);border-radius:7px;font-family:inherit;font-size:13px;color:var(--text);background:var(--blue-pale);direction:rtl;resize:none;overflow:hidden;min-height:32px;line-height:1.4;width:160px;}
.top-field textarea.guests-ta:focus{outline:none;border-color:var(--blue-light);background:#fff}

/* ── MEMBERS ── */
.members-area{display:flex;flex-direction:column;gap:3px;border-right:1px solid var(--blue-border);padding-right:10px;}
.members-area .area-label{font-size:15px;font-weight:600;color:var(--text-muted);display:flex;align-items:center;gap:6px;}
.members-area .area-label .badge{font-size:10px;background:#E3F2FD;color:var(--blue-mid);border-radius:8px;padding:1px 6px;font-weight:700;}
.members-chips{display:flex;flex-wrap:wrap;gap:4px}
.m-chip{display:inline-flex;align-items:center;padding:5px 11px;border-radius:14px;font-size:13px;font-weight:500;cursor:pointer;user-select:none;border:1.5px solid var(--blue-border);background:#fff;color:var(--text-muted);white-space:nowrap;transition:all .12s;}
.m-chip:hover{border-color:var(--blue-light);color:var(--blue-mid)}
.m-chip.on{background:var(--blue-mid);border-color:var(--blue-dark);color:#fff}

/* ── AGENDA ── */
.agenda-card{display:flex;flex-direction:column;overflow:hidden;flex:1}
.agenda-scroll{flex:1;overflow-y:auto;padding:8px 12px 4px}
.agenda-scroll::-webkit-scrollbar{width:4px}
.agenda-scroll::-webkit-scrollbar-thumb{background:var(--blue-border);border-radius:99px}
.agenda-item{background:var(--blue-pale);border:1.5px solid var(--blue-border);border-radius:8px;padding:6px 9px;margin-bottom:5px;}
.agenda-item-header{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.agenda-num{background:var(--blue-mid);color:#fff;border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.agenda-title{flex:1;background:#F1F8E9;font-size:14px;font-weight:700;padding:5px 8px;border:1.5px solid #A5D6A7;border-radius:6px;font-family:inherit;color:var(--text);direction:rtl;resize:none;overflow:hidden;min-height:34px;line-height:1.4;box-sizing:border-box;width:0;}
.agenda-title:focus{outline:none;border-color:#81C784;background:#fff}
.agenda-item-controls{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.agenda-item textarea{width:100%;background:#fff;font-size:14px;border:1.5px solid var(--blue-border);border-radius:6px;font-family:inherit;color:var(--text);direction:rtl;resize:none;padding:5px 8px;line-height:1.5;overflow:hidden;min-height:34px;box-sizing:border-box;}
.agenda-item textarea:focus{outline:none;border-color:var(--blue-light)}
.remove-btn{background:none;border:none;cursor:pointer;color:#ef9a9a;font-size:15px;padding:2px 5px;transition:color .12s;margin-right:auto;line-height:1;border-radius:4px;}
.remove-btn:hover{color:#c62828;background:#ffebee}
.move-btn{background:none;border:none;cursor:pointer;color:#90A4AE;font-size:13px;padding:2px 4px;line-height:1;border-radius:4px;transition:color .12s;flex-shrink:0;}
.move-btn:hover{color:#1a2340;background:#e8edf4}
.move-btn:disabled{opacity:0.2;cursor:default}
.add-btn{display:flex;align-items:center;gap:5px;background:none;border:1.5px dashed var(--blue-light);border-radius:7px;padding:6px 12px;color:var(--blue-mid);font-size:13px;font-weight:600;cursor:pointer;width:calc(100% - 24px);justify-content:center;margin:2px 12px 6px;transition:all .13s;font-family:inherit;flex-shrink:0;}
.add-btn:hover{background:var(--blue-pale);border-color:var(--blue-mid)}
.notes-section{border-top:1px solid var(--blue-border);padding:6px 12px 8px;flex-shrink:0;}
.notes-sub-title{font-size:15px;font-weight:700;color:var(--blue-mid);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.notes-section textarea{width:100%;padding:6px 9px;border:1.5px solid var(--blue-border);border-radius:7px;font-family:inherit;font-size:13px;color:var(--text);background:var(--blue-pale);direction:rtl;resize:none;min-height:38px;max-height:70px;line-height:1.45;transition:border-color .14s;}
.notes-section textarea:focus{outline:none;border-color:var(--blue-light);background:#fff}

/* ── ACTION ROW ── */
.action-row{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.action-row-secondary{display:flex;gap:8px;align-items:center;}
.btn-preview{padding:10px 16px;background:#fff;color:var(--blue-mid);border:2px solid var(--blue-mid);border-radius:var(--radius);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .14s;white-space:nowrap;}
.btn-preview:hover{background:var(--blue-pale)}
.btn-preview:disabled{opacity:.5;cursor:not-allowed}
.btn-create{flex:1;padding:10px;background:var(--blue-mid);color:#fff;border:none;border-radius:var(--radius);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:background .14s;box-shadow:0 3px 9px rgba(21,101,192,.22);}
.btn-create:hover{background:var(--blue-dark)}
.btn-create:disabled{background:#94a3b8;cursor:not-allowed;box-shadow:none}
.btn-clear-main{padding:10px 14px;background:#fff;color:#e53935;border:2px solid #e53935;border-radius:var(--radius);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .14s;white-space:nowrap;}
.btn-clear-main:hover{background:#ffebee;}
.status{font-size:12px;color:var(--text-muted);white-space:nowrap;flex-shrink:0}
.status.success{color:var(--blue-mid);font-weight:600}
.status.error{color:#c62828}
.result-links{display:none;gap:7px;align-items:center;flex-shrink:0;padding:7px 12px;background:var(--blue-pale);border-radius:8px;border:1.5px solid var(--blue-border);}
.result-links a{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:7px;font-size:13px;font-weight:600;text-decoration:none;transition:all .13s;}
.link-doc{background:var(--blue-mid);color:#fff}
.link-doc:hover{background:var(--blue-dark)}
.link-pdf{background:#fff;color:var(--blue-mid);border:1.5px solid var(--blue-border)}
.link-pdf:hover{background:#E3F2FD}
.btn-clear-small{margin-right:auto;padding:4px 9px;background:none;border:1px solid #CBD5E1;border-radius:5px;font-size:11px;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .13s;}
.btn-clear-small:hover{border-color:#e53935;color:#e53935}

/* ── TOPICS ── */
.topics-header{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--blue-border);flex-shrink:0;flex-wrap:wrap;}
.topics-date-field{display:flex;align-items:center;gap:6px;}
.topics-date-field label{font-size:13px;font-weight:600;color:var(--text-muted);white-space:nowrap;}
.topics-date-field input[type=date]{padding:4px 8px;border:1.5px solid var(--blue-border);border-radius:7px;font-family:inherit;font-size:13px;color:var(--text);background:var(--blue-pale);direction:rtl;}
.topics-date-field input[type=date]:focus{outline:none;border-color:var(--blue-light);background:#fff}
.topics-scroll{flex:1;overflow-y:auto;padding:8px 12px;}
.topics-scroll::-webkit-scrollbar{width:4px}
.topics-scroll::-webkit-scrollbar-thumb{background:var(--blue-border);border-radius:99px}
.topic-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--blue-pale);border:1.5px solid var(--blue-border);border-radius:8px;margin-bottom:6px;}
.topic-item input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--blue-mid);flex-shrink:0;}

.topic-move-btn{background:none;border:none;cursor:pointer;color:#90A4AE;font-size:13px;padding:2px 4px;line-height:1;border-radius:4px;transition:color .12s;flex-shrink:0;}

.topic-del-btn{background:none;border:none;cursor:pointer;color:#ef9a9a;font-size:15px;padding:2px 5px;transition:color .12s;line-height:1;border-radius:4px;flex-shrink:0;}

.btn-transfer{flex:1;padding:10px;background:var(--blue-mid);color:#fff;border:none;border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:background .14s;min-width:140px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1a2340;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.18);z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.show{opacity:1}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-left:6px;vertical-align:middle;}

//  AUTH
// ══════════════════════════════════════════════
var tokenClient = null;
var tokenRefreshTimer = null;

function initAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    prompt: '',
    callback: function(resp) {
      if (resp.error) {
        // Silent failed - show manual sign-in
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('authError').style.display = '';
        document.getElementById('authError').textContent = '';
        return;
      }
      accessToken = resp.access_token;
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = '';
      onSignedIn();
      // Schedule token refresh every 55 minutes
      if (tokenRefreshTimer) clearInterval(tokenRefreshTimer);
      tokenRefreshTimer = setInterval(silentRefresh, 55 * 60 * 1000);
    }
  });
  // Try silent login first
  tokenClient.requestAccessToken({prompt: ''});
}

function silentRefresh() {
  if (!tokenClient) return;
  tokenClient.requestAccessToken({prompt: ''});
}

function signIn() {
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: function(resp) {
        if (resp.error) {
          var el = document.getElementById('authError');
          el.style.display = '';
          el.textContent = 'שגיאה בהתחברות: ' + resp.error;
          return;
        }
        accessToken = resp.access_token;
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = '';
        onSignedIn();
        if (tokenRefreshTimer) clearInterval(tokenRefreshTimer);
        tokenRefreshTimer = setInterval(silentRefresh, 55 * 60 * 1000);
      }
    });
  }
  tokenClient.requestAccessToken({prompt: 'consent'});
}

function onSignedIn() {
  loadAppIcon();
  buildChips();
  document.getElementById('meetDate').valueAsDate = new Date();
  addAgendaItem(); addAgendaItem(); addAgendaItem(); addAgendaItem();
  loadDraft();
  loadTopicsData();
  startPolling();
}

// ══════════════════════════════════════════════
//  DRIVE HELPERS
// ══════════════════════════════════════════════
async function driveRequest(method, url, body) {
  var opts = {method: method, headers: {'Authorization': 'Bearer ' + accessToken}};
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  var r = await fetch(url, opts);
  if (!r.ok) { var t = await r.text(); throw new Error('Drive ' + r.status + ': ' + t.slice(0,200)); }
  var ct = r.headers.get('content-type') || '';
  return ct.includes('json') ? r.json() : r.text();
}

async function driveUploadJson(name, content, folderId, existingId) {
  var blob = new Blob([JSON.stringify(content, null, 2)], {type:'application/json'});
  var meta = {name: name, mimeType: 'application/json'};
  if (folderId && !existingId) meta.parents = [folderId];
  var form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
  form.append('file', blob);
  var url = existingId
    ? 'https://www.googleapis.com/upload/drive/v3/files/' + existingId + '?uploadType=multipart'
    : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  var r = await fetch(url, {method: existingId ? 'PATCH' : 'POST', headers:{'Authorization':'Bearer '+accessToken}, body:form});
  if (!r.ok) throw new Error('Upload ' + r.status);
  return r.json();
}

async function driveReadJson(fileId) {
  var r = await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media',
    {headers:{'Authorization':'Bearer '+accessToken}});
  if (!r.ok) return null;
  return r.json();
}

async function driveList(q) {
  var url = 'https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name,modifiedTime,createdTime)&orderBy=modifiedTime desc&pageSize=100';
  var res = await driveRequest('GET', url);
  return res.files || [];
}

async function driveDelete(fileId) {
  await fetch('https://www.googleapis.com/drive/v3/files/'+fileId,
    {method:'DELETE', headers:{'Authorization':'Bearer '+accessToken}});
}

async function getOrCreateYearFolder() {
  var year = new Date().getFullYear().toString();
  var q = '"'+FOLDERS.protocols+'" in parents and name="'+year+'" and mimeType="application/vnd.google-apps.folder" and trashed=false';
  var folders = await driveList(q);
  if (folders.length) return folders[0].id;
  var res = await driveRequest('POST', 'https://www.googleapis.com/drive/v3/files',
    {name: year, mimeType: 'application/vnd.google-apps.folder', parents: [FOLDERS.protocols]});
  return res.id;
}

// ══════════════════════════════════════════════
//  DRAFT
// ══════════════════════════════════════════════
function scheduleSave() {
  clearTimeout(saveTimer);
  setSaveIndicator('saving','שומר...');
  saveTimer = setTimeout(saveDraft, 2000);
}

async function saveDraft() {
  if (isClearing) return;
  var draft = collectDraft();
  draft.savedAt = Date.now();
  try {
    var res = await driveUploadJson('protocol_draft.json', draft, FOLDERS.drafts, currentDraftFileId);
    currentDraftFileId = res.id;
    lastSavedAt = draft.savedAt;
    setSaveIndicator('saved','נשמר ב-'+timeStr(draft.savedAt));
  } catch(e) {
    setSaveIndicator('error','שגיאה בשמירה');
  }
}

async function loadDraft() {
  try {
    var files = await driveList('"'+FOLDERS.drafts+'" in parents and name="protocol_draft.json" and trashed=false');
    if (!files.length) return;
    currentDraftFileId = files[0].id;
    var data = await driveReadJson(files[0].id);
    if (!data) return;
    lastSavedAt = data.savedAt || 0;
    populateFromDraft(data);
    setSaveIndicator('saved','נשמר ב-'+timeStr(data.savedAt));
  } catch(e) {}
}

function collectDraft() {

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollDraft, 30000);
}

async function pollDraft() {
  if (isClearing) return;
  try {
    var files = await driveList('"'+FOLDERS.drafts+'" in parents and name="protocol_draft.json" and trashed=false');
    if (!files.length) { if (currentDraftFileId) { currentDraftFileId = null; } return; }
    var serverModified = new Date(files[0].modifiedTime).getTime();
    if (serverModified > lastSavedAt + 5000) {
      var data = await driveReadJson(files[0].id);
      if (!data) return;
      var serverSavedAt = data.savedAt || serverModified;
      if (serverSavedAt > lastSavedAt + 5000) {
        currentDraftFileId = files[0].id;
        lastSavedAt = serverSavedAt;
        populateFromDraft(data);
        setSaveIndicator('saved','נשמר ב-'+timeStr(serverSavedAt));
        setSyncStatus('עודכן מהמכשיר האחר');
        showToast('עודכן מהמכשיר האחר ✓');
        setTimeout(function(){ setSyncStatus(''); }, 5000);
      }
    }
  } catch(e) {}
}

function renderTopics() {
  document.getElementById('nextMeetDate').value = topicsData.date || '';
  var list = document.getElementById('topicsList');
  list.innerHTML = '';

  topics.forEach(function(t, i) {

  });

function buildTopicEl(t, i, total) {
  var div = document.createElement('div');
  div.className = 'topic-item';

  var cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!t.checked;
  cb.setAttribute('aria-label', 'בחר נושא');
  cb.onchange = function() {
    topicsData.topics[i].checked = cb.checked;
    inp.className = 'topic-text' + (cb.checked ? ' checked' : '');
    saveTopicsData();
  };

  var inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'topic-text' + (t.checked ? ' checked' : '');
  inp.value = t.text || '';
  inp.placeholder = 'נושא לדיון...';
  inp.oninput = function() {
    topicsData.topics[i].text = inp.value;
    saveTopicsData();
  };

  var upBtn = document.createElement('button');
  upBtn.className = 'topic-move-btn';
  upBtn.textContent = '▲';
  upBtn.disabled = i === 0;
  upBtn.onclick = function() { moveTopic(i, -1); };

  var downBtn = document.createElement('button');
  downBtn.className = 'topic-move-btn';
  downBtn.textContent = '▼';
  downBtn.disabled = i === total - 1;
  downBtn.onclick = function() { moveTopic(i, 1); };

  var delBtn = document.createElement('button');
  delBtn.className = 'topic-del-btn';
  delBtn.textContent = '✕';
  delBtn.onclick = function() {
    topicsData.topics.splice(i, 1);
    renderTopics();
    saveTopicsData();
  };

  div.appendChild(cb);
  div.appendChild(inp);
  div.appendChild(upBtn);
  div.appendChild(downBtn);
  div.appendChild(delBtn);
  return div;
}

function addTopicItem() {
  if (!topicsData.topics) topicsData.topics = [];
  topicsData.topics.unshift({text:'', checked:false});
  renderTopics();
  saveTopicsData();
  setTimeout(function() {
    var first = document.querySelector('#topicsList .topic-text');
    if (first) first.focus();
  }, 50);
}

function moveTopic(i, dir) {
  var arr = topicsData.topics;
  var j = i + dir;
  if (j < 0 || j >= arr.length) return;
  var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  renderTopics();
  saveTopicsData();
}

function transferTopics() {
  var checked = (topicsData.topics||[]).filter(function(t){return t.checked;});
  if (!checked.length) { showToast('לא נבחרו נושאים'); return; }
  var d = topicsData.date;
  if (d) document.getElementById('meetDate').value = d;
  document.getElementById('agendaList').innerHTML = '';
  checked.forEach(function(t){ addAgendaItem(t.text,''); });
  while (document.getElementById('agendaList').children.length < 4) addAgendaItem();
  topicsData.topics = topicsData.topics.filter(function(t){return !t.checked;});
  renderTopics();
  saveTopicsData();
  scheduleSave();
  var btn = document.querySelector('.tab-btn');
  switchTab('new', btn);
  showToast('הנושאים הועברו לפרוטוקול חדש ✓');
}

// ══════════════════════════════════════════════
//  DOCS API
// ══════════════════════════════════════════════
async function docsRequest(docId, body) {
  var r = await fetch('https://docs.googleapis.com/v1/documents/'+docId+':batchUpdate', {
    method:'POST',
    headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if (!r.ok) { var t = await r.text(); throw new Error('Docs '+r.status+': '+t.slice(0,200)); }
  return r.json();
}

function replaceTextReq(find, rep) {
  return {replaceAllText:{containsText:{text:find,matchCase:true},replaceText:rep||''}};
}

async function getDoc(docId) {
  var r = await fetch('https://docs.googleapis.com/v1/documents/'+docId,
    {headers:{'Authorization':'Bearer '+accessToken}});
  if (!r.ok) throw new Error('GetDoc ' + r.status);
  return r.json();
}

async function applyRtl(docId) {
  var doc = await getDoc(docId);
  var requests = [];
  function walk(elements) {
    (elements||[]).forEach(function(el) {
      if (el.paragraph) {
        var s = el.startIndex, e = el.endIndex - 1;
        if (e > s) {
          requests.push({updateParagraphStyle:{range:{startIndex:s,endIndex:e},paragraphStyle:{direction:'RIGHT_TO_LEFT'},fields:'direction'}});
          requests.push({updateTextStyle:{range:{startIndex:s,endIndex:e},textStyle:{underline:false},fields:'underline'}});
        }
      }
      if (el.table) el.table.tableRows.forEach(function(row){
        row.tableCells.forEach(function(cell){ walk(cell.content); });
      });
    });
  }
  walk(doc.body.content);
  if (requests.length) await docsRequest(docId, {requests:requests});
}

// ══════════════════════════════════════════════
//  BUILD DOC
// ══════════════════════════════════════════════
async function buildDoc(data, templateId, extraReplacements) {
  // Copy template
  var copyRes = await driveRequest('POST',
    'https://www.googleapis.com/drive/v3/files/'+templateId+'/copy',
    {name: data.docName || 'מסמך'},
    false
  );
  var docId = copyRes.id;

  // Base replacements
  var reqs = [
    replaceTextReq('{{DATE}}', data.dateHeb || ''),
    replaceTextReq('{{MEETING_DATE}}', data.dateHeb || ''),
    replaceTextReq('{{TITLE}}', data.title || '')
  ];
  if (extraReplacements) extraReplacements.forEach(function(r){ reqs.push(r); });

  await docsRequest(docId, {requests: reqs});
  await applyRtl(docId);

  // Fix date to LTR after RTL pass
  var freshDoc = await getDoc(docId);
  var dateReqs = [];
  (freshDoc.body.content||[]).forEach(function(el) {
    if (el.paragraph && el.paragraph.elements) {
      el.paragraph.elements.forEach(function(elem) {
        if (elem.textRun && elem.textRun.content &&
            (elem.textRun.content.indexOf('תאריך') !== -1 || elem.textRun.content.indexOf(data.dateHeb||'XX') !== -1)) {
          dateReqs.push({updateParagraphStyle:{
            range:{startIndex:el.startIndex,endIndex:el.endIndex-1},
            paragraphStyle:{alignment:'START',direction:'LEFT_TO_RIGHT'},
            fields:'alignment,direction'
          }});
        }
      });
    }
  });
  if (dateReqs.length) await docsRequest(docId, {requests:dateReqs});

  return docId;
}

// ══════════════════════════════════════════════
//  EXPORT TO PDF
// ══════════════════════════════════════════════
async function exportDocAsPdf(docId, pdfName, targetFolderId) {
  var pdfRes = await fetch(
    'https://www.googleapis.com/drive/v3/files/'+docId+'/export?mimeType=application/pdf',
    {headers:{'Authorization':'Bearer '+accessToken}}
  );
  if (!pdfRes.ok) throw new Error('Export PDF ' + pdfRes.status);
  var pdfBlob = await pdfRes.blob();

  var form = new FormData();
  form.append('metadata', new Blob([JSON.stringify({name:pdfName, parents:[targetFolderId]})],{type:'application/json'}));
  form.append('file', pdfBlob);

  var uploadRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method:'POST', headers:{'Authorization':'Bearer '+accessToken}, body:form
  });
  if (!uploadRes.ok) throw new Error('PDF upload ' + uploadRes.status);
  return uploadRes.json();
}

async function createProtocol() {
  var btn = document.getElementById('genBtn');
  btn.disabled = true; btn.innerHTML = '⏳ יוצר...<span class="spinner"></span>';
  setStatus('יוצר פרוטוקול...');

    var dateHeb = formatDateHeb(data.date);

    var decisionsText = data.agenda.map(function(item,i){
      return (i+1)+'. '+(item.title||'')+(item.content?':\n'+item.content:'');
    }).join('\n\n');

    // Get/create year folder
    var yearFolderId = await getOrCreateYearFolder();

    // Build Doc (copy template → fill → RTL)
    var docId = await buildDoc({
      docName: safeName, dateHeb: dateHeb,
      title: 'פרוטוקול ישיבת ועדת חזות היישוב'+(data.meetNum?' | ישיבה '+data.meetNum:'')
    }, TEMPLATES.protocol, [

      replaceTextReq('{{DECISIONS_TABLE}}', decisionsText),

      'https://www.googleapis.com/drive/v3/files/'+docId+'?addParents='+yearFolderId+'&removeParents=root',
      null, false

    // Export PDF and save to year folder
    var pdfFile = await exportDocAsPdf(docId, safeName+'.pdf', yearFolderId);

    // Save JSON (for content search) to year folder
    var jsonData = Object.assign({}, data, {createdAt: Date.now(), docId: docId, pdfId: pdfFile.id});
    await driveUploadJson(safeName+'.json', jsonData, yearFolderId, null);

    // Clear draft

    showToast('פרוטוקול נוצר בהצלחה ✓');

  } catch(e) {
    setStatus('שגיאה: '+e.message,'error');
    showToast('שגיאה: '+e.message);
  }
  btn.disabled = false; btn.innerHTML = '💾 צור פרוטוקול סופי';

async function searchProtocols() {

    var ql = q.toLowerCase();

    // Search draft content
    var drafts = await driveList('"'+FOLDERS.drafts+'" in parents and name="protocol_draft.json" and trashed=false');
    for (var i=0; i<drafts.length; i++) {
      try {
        var data = await driveReadJson(drafts[i].id);
        if (data && JSON.stringify(data).toLowerCase().indexOf(ql) !== -1) {
          results.push({type:'draft', displayName:'טיוטה נוכחית (מכיל: "'+q+'")',
            date: drafts[i].modifiedTime ? drafts[i].modifiedTime.slice(0,10) : ''});
        }
      } catch(e2){}
    }

    // Search JSON files (protocol content) in year folders
    var yearFolders = await driveList('"'+FOLDERS.protocols+'" in parents and mimeType="application/vnd.google-apps.folder" and trashed=false');
    for (var j=0; j<yearFolders.length; j++) {
      // Search JSON content files
      var jsonFiles = await driveList('"'+yearFolders[j].id+'" in parents and mimeType="application/json" and trashed=false');
      for (var k=0; k<jsonFiles.length; k++) {
        try {
          var jdata = await driveReadJson(jsonFiles[k].id);
          if (jdata && JSON.stringify(jdata).toLowerCase().indexOf(ql) !== -1) {
            // Find matching PDF
            var pdfName = jsonFiles[k].name.replace('.json','.pdf');
            var pdfs = await driveList('"'+yearFolders[j].id+'" in parents and name="'+pdfName+'" and trashed=false');
            var pdfUrl = pdfs.length ? 'https://drive.google.com/file/d/'+pdfs[0].id+'/view' : null;
            var docUrl = jdata.docId ? 'https://docs.google.com/document/d/'+jdata.docId+'/edit' : null;
            results.push({type:'pdf',
              displayName: jsonFiles[k].name.replace('.json','').replace(/_/g,' ') + ' (מכיל: "'+q+'")',
              fileId: pdfs.length ? pdfs[0].id : null,
              url: pdfUrl, docUrl: docUrl,
              date: jsonFiles[k].createdTime ? jsonFiles[k].createdTime.slice(0,10) : ''});
          }
        } catch(e3){}
      }
      // Also search PDF names directly
      var pdfsByName = await driveList('"'+yearFolders[j].id+'" in parents and mimeType="application/pdf" and name contains "'+q+'" and trashed=false');
      pdfsByName.forEach(function(f){
        if (!results.find(function(r){return r.fileId===f.id;})) {
          results.push({type:'pdf', displayName:f.name.replace('.pdf','').replace(/_/g,' '),
            fileId:f.id, url:'https://drive.google.com/file/d/'+f.id+'/view',
            date: f.createdTime ? f.createdTime.slice(0,10) : ''});
        }
      });
    }

    if (!results.length) {
      el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">לא נמצאו תוצאות עבור "'+q+'"</div>';
      return;
    }
    renderProtocolsList(results);
  } catch(e) {
    el.innerHTML = '<div style="color:#c62828;font-size:13px;">שגיאה בחיפוש</div>';
  }
}

function renderProtocolsList(results) {
  var el = document.getElementById('searchResults');
  if (!results.length) {
    el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">אין פרוטוקולים</div>';
    return;
  }
  el.innerHTML = '';
  results.forEach(function(r) {
    var div = document.createElement('div');
    div.className = 'search-result';

    var nameDiv = document.createElement('div');
    nameDiv.style.flex = '1';
    if (r.type === 'draft') {
      var badge = document.createElement('span');
      badge.className = 'draft-badge';
      badge.textContent = 'טיוטה';
      nameDiv.appendChild(badge);
    }
    var nameSpan = document.createElement('div');
    nameSpan.className = 'result-name';
    nameSpan.textContent = r.displayName;
    nameDiv.appendChild(nameSpan);
    var dateSpan = document.createElement('div');
    dateSpan.className = 'result-year';
    dateSpan.textContent = r.date;
    nameDiv.appendChild(dateSpan);
    div.appendChild(nameDiv);

    var btnsDiv = document.createElement('div');
    btnsDiv.style.cssText = 'display:flex;gap:5px;align-items:center;flex-shrink:0;';

    if (r.type === 'draft') {
      var editBtn = document.createElement('button');
      editBtn.className = 'result-link';
      editBtn.textContent = 'ערוך';
      editBtn.onclick = function(){ switchTab('new', document.querySelector('.tab-btn')); };
      btnsDiv.appendChild(editBtn);
    } else {
      if (r.docUrl) {
        var docLink = document.createElement('a');
        docLink.href = r.docUrl; docLink.target = '_blank';
        docLink.className = 'result-link';
        docLink.textContent = 'Doc';
        btnsDiv.appendChild(docLink);
      }
      if (r.url) {
        var pdfLink = document.createElement('a');
        pdfLink.href = r.url; pdfLink.target = '_blank';
        pdfLink.className = 'result-link';
        pdfLink.textContent = 'PDF';
        btnsDiv.appendChild(pdfLink);
      }
    }
    div.appendChild(btnsDiv);
    el.appendChild(div);
  });
}

// ══════════════════════════════════════════════
//  AGENDA
// ══════════════════════════════════════════════
function addAgendaItem(title, content) {
  var list = document.getElementById('agendaList');
  var idx = list.children.length;
  var li = document.createElement('li');
  li.className = 'agenda-item';

  var hdr = document.createElement('div');
  hdr.className = 'agenda-item-header';
  var num = document.createElement('span');
  num.className = 'agenda-num';
  num.textContent = idx + 1;
  var ta = document.createElement('textarea');
  ta.className = 'agenda-title';
  ta.placeholder = 'כותרת הנושא...';
  ta.value = title || '';
  ta.rows = 1;
  ta.oninput = function(){ autoGrow(this); scheduleSave(); };
  hdr.appendChild(num); hdr.appendChild(ta);
  li.appendChild(hdr);

  var ctrl = document.createElement('div');
  ctrl.className = 'agenda-item-controls';
  var upBtn = document.createElement('button');
  upBtn.className = 'move-btn'; upBtn.textContent = '▲';
  upBtn.onclick = function(){ moveAgenda(li,-1); };
  var downBtn = document.createElement('button');
  downBtn.className = 'move-btn'; downBtn.textContent = '▼';
  downBtn.onclick = function(){ moveAgenda(li,1); };
  var delBtn = document.createElement('button');
  delBtn.className = 'remove-btn'; delBtn.textContent = '✕';
  delBtn.onclick = function(){
    if (list.children.length > 1){ li.remove(); renumberAgenda(); scheduleSave(); }
  };
  ctrl.appendChild(upBtn); ctrl.appendChild(downBtn); ctrl.appendChild(delBtn);
  li.appendChild(ctrl);

  var ta2 = document.createElement('textarea');
  ta2.className = 'agenda-content';
  ta2.placeholder = 'תיאור ההחלטה / דיון...';
  ta2.value = content || '';
  ta2.rows = 1;
  ta2.oninput = function(){ autoGrow(this); scheduleSave(); };
  li.appendChild(ta2);

  list.appendChild(li);
  setTimeout(function(){ autoGrow(ta); if(content) autoGrow(ta2); }, 10);
  return li;
}

function moveAgenda(li, dir) {
  var list = li.parentNode;
  var items = Array.from(list.children);
  var i = items.indexOf(li);
  var j = i + dir;
  if (j < 0 || j >= items.length) return;
  if (dir === -1) list.insertBefore(li, items[j]);
  else list.insertBefore(items[j], li);
  renumberAgenda(); scheduleSave();
}

function renumberAgenda() {
  document.querySelectorAll('#agendaList .agenda-num').forEach(function(n,i){ n.textContent = i+1; });
}

// ══════════════════════════════════════════════
//  MEMBERS
// ══════════════════════════════════════════════
function buildChips() {
  var container = document.getElementById('membersChips');
  container.innerHTML = '';
  ALL_MEMBERS.forEach(function(m) {
    var chip = document.createElement('span');
    chip.className = 'm-chip'+(presentSet.has(m)?' on':'');
    chip.textContent = m;
    chip.onclick = function(){
      if (presentSet.has(m)) presentSet.delete(m);
      else presentSet.add(m);
      chip.classList.toggle('on');
      updateBadge(); scheduleSave();
    };
    container.appendChild(chip);
  });
  updateBadge();
}

function updateBadge() {
  document.getElementById('presentBadge').textContent = presentSet.size+' / '+ALL_MEMBERS.length;
}

// ══════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-'+name).classList.add('active');
  var allBtns = document.querySelectorAll('.tab-btn');
  var map = {new:0, topics:1, search:2};
  if (btn) btn.classList.add('active');
  else if (map[name] !== undefined && allBtns[map[name]]) allBtns[map[name]].classList.add('active');
  if (name === 'search') loadProtocolsList();
}

// ══════════════════════════════════════════════
//  DIALOG
// ══════════════════════════════════════════════
function showDialog(action, msg, yesLabel, danger) {
  dialogAction = action;
  document.getElementById('dialogMsg').textContent = msg;
  var yBtn = document.getElementById('dialogYes');
  yBtn.textContent = yesLabel || 'אישור';
  yBtn.className = 'dialog-btn-yes'+(danger?' danger':'');
  document.getElementById('confirmOverlay').classList.add('show');
}

function dialogConfirm() {
  closeDialog();
  if (dialogAction === 'createProtocol') createProtocol();
  else if (dialogAction === 'clearAll') clearAll();
}

function closeDialog() {
  document.getElementById('confirmOverlay').classList.remove('show');
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function setStatus(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status'+(cls?' '+cls:'');
}

function setSaveIndicator(cls, msg) {
  var el = document.getElementById('saveIndicator');
  el.textContent = msg;
  el.className = 'save-indicator'+(cls?' '+cls:'');
}

function setSyncStatus(msg) {
  document.getElementById('syncStatus').textContent = msg;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function timeStr(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function formatDateHeb(dateStr) {
  if (!dateStr) return '';
  var p = dateStr.split('-');
  if (p.length === 3) return p[2]+'.'+p[1]+'.'+p[0];
  return dateStr;
}
